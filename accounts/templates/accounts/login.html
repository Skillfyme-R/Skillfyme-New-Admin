<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Skillfyme</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .card { background: #fff; border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 28px; font-weight: 700; color: #0f3460; }
    .logo p { color: #666; font-size: 14px; margin-top: 4px; }
    .error-box { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; border-radius: 8px; padding: 12px 16px; font-size: 14px; margin-bottom: 20px; }
    .btn-google { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 12px 20px; background: #fff; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 15px; font-weight: 500; color: #374151; text-decoration: none; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s; }
    .btn-google:hover { border-color: #4285F4; box-shadow: 0 0 0 3px rgba(66,133,244,0.15); }
    .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; color: #9ca3af; font-size: 13px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    input[type="text"], input[type="password"] { width: 100%; padding: 10px 14px; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 15px; color: #111; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #0f3460; box-shadow: 0 0 0 3px rgba(15,52,96,0.1); }
    .btn-submit { width: 100%; padding: 11px; background: #0f3460; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-submit:hover { background: #1a4a80; }
    .note { font-size: 12px; color: #9ca3af; text-align: center; margin-top: 20px; }
    details { cursor: pointer; }
    summary { font-size: 13px; color: #6b7280; margin-bottom: 12px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Skillfyme</h1>
    <p>EdTech Operations Platform</p>
  </div>
  {% if error %}
  <div class="error-box">{{ error }}</div>
  {% endif %}
  {% load socialaccount %}
  <a href="{% provider_login_url 'google' %}" class="btn-google">
    <svg width="20" height="20" viewBox="0 0 48 48">
      <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12s5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
      <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
      <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
      <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
    </svg>
    Sign in with Google
  </a>
  <div class="divider">or use password</div>
  <details {% if request.method == 'POST' %}open{% endif %}>
    <summary>Sign in with username &amp; password</summary>
    <form method="post" action="/login/">
      {% csrf_token %}
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-submit">Sign In</button>
    </form>
  </details>
  <p class="note">Access is restricted to authorised users only.</p>
</div>
</body>
</html>
